<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <title>Todo List Web Demo</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #f5f5f5;
                font-family:'Roboto',system-ui,sans-serif;
                color: #333;
            }
            #event-log {
                margin-top: 20px;
                padding: 12px 16px;
                background: #fff;
                border: 1px solid #ddd;
                border-radius: 6px;
                width: 380px;
                max-height: 120px;
                overflow-y: auto;
                font-size: 13px;
                color: #666;
            }
            #event-log h3 {
                margin: 0 0 8px;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #999;
            }
            #event-log p {
                margin: 4px 0;
                padding: 4px 8px;
                background: #f5f5f5;
                border-radius: 4px;
                font-family:'Roboto',system-ui,sans-serif;
                font-size: 12px;
            }
        </style>
    </head>
    <body>

        <!-- template to avoid innerHTML in shadowDOM -->
        <template id="todo-template">
            <style>
                :host {
                    display: block;
                    width: 420px;
                    font-family:'Roboto',system-ui,sans-serif;
                }
                .card {
                    background: #fff;
                    border: 1px solid #ddd;
                    border-radius: 8px;
                    padding: 24px;
                }
                h2 {
                    margin: 0 0 16px;
                    font-size: 20px;
                    font-weight: 600;
                    color: #333;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                }
                h2 .count {
                    font-size: 13px;
                    font-weight: 500;
                    background: #555;
                    color: #fff;
                    padding: 1px 8px;
                    border-radius: 10px;
                    min-width: 18px;
                    text-align: center;
                }
                .input-row {
                    display: flex;
                    gap: 8px;
                    margin-bottom: 16px;
                }
                input {
                    flex: 1;
                    padding: 8px 12px;
                    border: 1px solid #ccc;
                    border-radius: 4px;
                    background: #fff;
                    color: #333;
                    font-size: 14px;
                    outline: none;
                }
                input:focus {
                    border-color: #888;
                }
                input::placeholder {
                    color: #aaa;
                }
                button {
                    padding: 8px 16px;
                    border: none;
                    border-radius: 4px;
                    background: #555;
                    color: #fff;
                    font-size: 14px;
                    font-weight: 500;
                    cursor: pointer;
                }
                button:hover {
                    background: #444;
                }
                ul {
                    list-style: none;
                    margin: 0;
                    padding: 0;
                    display: flex;
                    flex-direction: column;
                    gap: 4px;
                }
                li {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    padding: 8px 12px;
                    background: #f5f5f5;
                    border-radius: 4px;
                    font-size: 14px;
                    color: #333;
                }
                li .index {
                    font-size: 12px;
                    font-weight: 600;
                    color: #888;
                    min-width: 20px;
                    text-align: center;
                }
                li .text {
                    flex: 1;
                }
                li .remove {
                    background: none;
                    border: none;
                    color: #aaa;
                    cursor: pointer;
                    font-size: 18px;
                    padding: 0 4px;
                    line-height: 1;
                }
                li .remove:hover {
                    color: #e55;
                }
                .empty {
                    text-align: center;
                    padding: 20px;
                    color: #aaa;
                    font-size: 14px;
                }
            </style>

            <div class="card">
                <h2>
                    Todo List
                    <span class="count">0</span>
                </h2>
                <div class="input-row">
                    <input type="text" placeholder="Input An Item" />
                    <button id="add-btn">Add</button>
                </div>
                <ul></ul>
                <div class="empty">No Items Yet</div>
            </div>
        </template>

        <template id="todo-item-tpl">
            <li>
                <span class="index"></span>
                <span class="text"></span>
                <button class="remove" title="Remove">×</button>
            </li>
        </template>

        <todo-list></todo-list>

        <div id="event-log">
            <h3>List Log</h3>
        </div>

        <script>
            class TodoList extends HTMLElement {
                #items = [];

                constructor() {
                    super();
                    this.attachShadow({ mode: 'open' });
                }

                connectedCallback() {
                    const rootTpl = document.getElementById('todo-template');
                    // Cloning the template instead of using innerHTML and parsing
                    this.shadowRoot.appendChild(rootTpl.content.cloneNode(true));
                    this.#bindEvents();
                }

                get items() {
                    return [...this.#items];
                }

                #bindEvents() {
                    const input = this.shadowRoot.querySelector('input');
                    const btn = this.shadowRoot.querySelector('#add-btn');

                    btn.addEventListener('click', () => this.#addFromInput(input));
                    input.addEventListener('keydown', e => {
                        if (e.key === 'Enter') this.#addFromInput(input);
                    });

                    this.shadowRoot.querySelector('ul').addEventListener('click', e => {
                        const rmBtn = e.target.closest('.remove');
                        if (!rmBtn) return;
                        const idx = Number(rmBtn.dataset.idx);
                        this.#removeItem(idx);
                    });
                }

                #addFromInput(input) {
                    const val = input.value.trim();
                    if (!val) return;
                    this.#items.push(val);
                    input.value = '';
                    input.focus();
                    this.#updateList();
                    this.#emitChange();
                }

                #removeItem(idx) {
                    this.#items.splice(idx, 1);
                    this.#updateList();
                    this.#emitChange();
                }

                #updateList() {
                    const ul = this.shadowRoot.querySelector('ul');
                    const empty = this.shadowRoot.querySelector('.empty');
                    const count = this.shadowRoot.querySelector('.count');
                    const itemTpl = document.getElementById('todo-item-tpl');

                    count.textContent = this.#items.length;
                    empty.style.display = this.#items.length ? 'none' : 'block';

                    ul.replaceChildren();

                    this.#items.forEach((item, i) => {
                        const li = itemTpl.content.cloneNode(true);
                        li.querySelector('.index').textContent = i + 1;
                        li.querySelector('.text').textContent = item;
                        li.querySelector('.remove').dataset.idx = i;
                        ul.appendChild(li);
                    });
                }

                #emitChange() {
                    this.dispatchEvent(new CustomEvent('listChanged', {
                        bubbles: true,
                        composed: true,
                        detail: { items: this.items }
                    }));
                }
            }

            customElements.define('todo-list', TodoList);

            const log = document.getElementById('event-log');
            document.querySelector('todo-list').addEventListener('listChanged', e => {
                const p = document.createElement('p');
                p.textContent = `[${new Date().toLocaleTimeString()}]  items: [${e.detail.items.map(i => `"${i}"`).join(', ')}]`;
                log.appendChild(p);
                p.scrollIntoView({ behavior: 'smooth' });
            });
        </script>

    </body>
</html>
